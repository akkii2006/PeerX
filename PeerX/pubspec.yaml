name: peerx
description: PeerX encrypted messenger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  # Crypto
  cryptography: ^2.7.0

  crypto: ^3.0.3

  # Secure storage (keychain on iOS, keystore on Android)
  flutter_secure_storage: ^9.2.2

  # Local database
  drift: ^2.18.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24

  # WebSocket
  web_socket_channel: ^3.0.1

  # Device info for ID generation
  device_info_plus: ^10.1.2

  # Push notifications
  flutter_local_notifications: ^17.2.2
  http: ^1.2.2

  # Utilities
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  path_provider: ^2.1.4


  permission_handler: ^11.3.1

  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/icon.png"
  web:
    generate: false